<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Demo Final: Grupal DeFi</title>
<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1E1E24 0%, #0A0A0F 100%);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  
  .presentation-container {
    display: flex;
    align-items: center;
    gap: 60px;
  }
  
  /* Mockup Frame de un Teléfono */
  .device-mockup {
    position: relative;
    width: 390px;
    height: 844px; /* Tamaño promedio iPhone 14/15 */
    background: #000;
    border-radius: 50px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 10px rgba(255,255,255,0.1);
    border: 14px solid #333;
    overflow: hidden;
  }
  
  /* Botones del teléfono (efecto visual) */
  .device-mockup::before {
    content: '';
    position: absolute;
    left: -17px;
    top: 150px;
    width: 3px;
    height: 60px;
    background: #444;
    border-radius: 3px 0 0 3px;
  }
  .device-mockup::after {
    content: '';
    position: absolute;
    right: -17px;
    top: 220px;
    width: 3px;
    height: 90px;
    background: #444;
    border-radius: 0 3px 3px 0;
  }
  
  /* Dynamic Island / Notch */
  .notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 30px;
    background: #000;
    border-radius: 15px;
    z-index: 999;
  }
  
  /* Iframe que carga tu app */
  .app-frame {
    width: 100%;
    height: 100%;
    border: none;
    background: #F8F9FE;
  }
  
  /* Información al lado del teléfono */
  .info-panel {
    color: white;
    max-width: 400px;
  }
  .info-panel h1 {
    font-size: 42px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #A243F6 0%, #820ad1 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .info-panel p {
    font-size: 18px;
    color: #9590A3;
    line-height: 1.6;
  }
  
  .tech-pills {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  
  .pill {
    padding: 8px 16px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
  }
</style>
</head>
<body>

<div class="presentation-container">
  
  <!-- Información para la presentación -->
  <div class="info-panel">
    <h1>Grupal</h1>
    <p>Plataforma Fintech Descentralizada para la Gestión Financiera Grupal.</p>
    <p><em>Prototipo Final - DeFi 1</em></p>
    
    <div class="tech-pills">
      <div class="pill" style="color: #61DAFB;">Frontend</div>
      <div class="pill" style="color: #3776AB;">Python</div>
      <div class="pill" style="color: #7D21F4;">Solidity</div>
    </div>
  </div>

  <!-- El Teléfono -->
  <div class="device-mockup">
    <div class="notch"></div>
    <iframe src="index.html" class="app-frame" title="App Grupal"></iframe>
  </div>

</div>

</body>
</html>
